<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Guess The Number - By code-royal</title>
</head>

<body>
    <div class="main_container">
        <div class="gameBox">
            <div class="container1">
                <h1 id="heading">Number Guessing Game</h1>
                <p>Enter any numbers from 1 to 100</p>
                <input type="text" name="guessInput" id="guessInput" placeholder="What's your guess?">
                <br>
                <button id="check" class="btn">Guess</button> <!-- Displays until you guess the right number -->
                <button id="restart" class="btn">Restart</button> <!-- Only displays after you guess a number right -->

                <!-- Result displays here, whether you guessed right or not -->
                <p id="result"></p>
            </div>
        </div>
        <div class="container2">
            <h2>Recent Guesses</h2>
            <hr style="height: 1px; background-color: var(--primary); border-color: var(--primary);">
            <p id="recents"></p>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
